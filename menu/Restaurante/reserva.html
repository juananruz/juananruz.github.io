<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Reserva</title>
</head>
<body class="reserva-body">

<div class="reserva-container">
    <button class="close-btn">×</button>

    <h2 class="reserva-titulo">Haz una reserva</h2>

    <form class="reserva-form">

        <div class="fila">
            <input type="text" class="campo" placeholder="Su nombre">
            <input type="number" class="campo" placeholder="Número de clientes">
        </div>

        <div class="fila">
            <input type="email" class="campo" placeholder="Su correo electrónico">
            <input type="tel" class="campo" placeholder="Su teléfono">
        </div>

        <div class="fila">
            <input type="date" class="campo">
            <input type="time" class="campo">
        </div>

        <textarea class="campo textarea" placeholder="Su mensaje"></textarea>

        <div class="btn-contenedor">
            <button type="submit" class="btn-reserva">SOLICITAR RESERVA</button>
        </div>

        <p class="aviso">
            Si desea saber cómo protegemos sus datos, consulte nuestra 
            <a href="#" class="privacidad-link">Política de privacidad</a>
        </p>
    </form>
</div>
    <a href="index.html">Volver</a>
</body>
</html>
