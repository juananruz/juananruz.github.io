<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 2 - Numero Divisible por 2</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <a href="../index.html" class="volver">← Volver al menu</a>
        
        <h1>Actividad 2: Numero Divisible por 2</h1>
        <p>Introduce un numero entero entre 1 y 30</p>
        
        <div class="formulario">
            <div class="campo">
                <label for="numero">Numero:</label>
                <input type="number" id="numero" placeholder="Introduce un numero del 1 al 30" min="1" max="30">
            </div>
            
            <button id="btnComprobar" class="btn-comprobar">Comprobar</button>
        </div>
        
        <div id="resultado" class="resultado"></div>
    </div>

    <script src="actividad2.js"></script>
</body>
</html>
