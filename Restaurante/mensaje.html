<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Mensaje</title>
</head>
<body class="mensaje-body">

<div class="mensaje-container">

    <button class="close-btn">×</button>

    <h2 class="mensaje-titulo">Envíenos su mensaje</h2>

    <form class="mensaje-form">

        <div class="fila">
            <input type="text" class="campo" placeholder="Su nombre">
            <input type="email" class="campo" placeholder="Su correo electrónico">
            <input type="tel" class="campo" placeholder="Su teléfono">
        </div>

        <input type="text" class="campo campo-asunto" placeholder="Asunto">

        <div class="mensaje-box">
            <textarea class="campo campo-textarea" placeholder="Su mensaje" maxlength="500"></textarea>
            <span class="contador">0 / 500</span>
        </div>

        <div class="btn-contenedor">
            <button type="submit" class="btn-enviar">ENVIAR</button>
        </div>

    </form>
</div>
    <a href="index.html">Volver</a>
</body>
</html>
