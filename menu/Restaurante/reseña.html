<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Reseña</title>
</head>
<body class="resena-body">

<div class="resena-container">

    <button class="close-btn">×</button>

    <h2 class="resena-titulo">Deje su reseña del plato</h2>

    <form class="resena-form">

        <div class="fila">
            <input type="text" class="campo" placeholder="Su nombre">
            <input type="email" class="campo" placeholder="Su correo electrónico">
        </div>

        <input type="text" class="campo campo-plato" placeholder="Nombre del plato">

        <input type="text" class="campo campo-valoracion" placeholder="Valoración del 1 al 5">

        <div class="mensaje-box">
            <textarea class="campo campo-textarea" placeholder="Su reseña" maxlength="500"></textarea>
            <span class="contador">0 / 500</span>
        </div>

        <div class="btn-contenedor">
            <button type="submit" class="btn-enviar">ENVIAR</button>
        </div>

    </form>
</div>
    <a href="index.html">Volver</a>
</body>
</html>
