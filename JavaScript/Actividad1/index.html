<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 1 - Datos Personales</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <a href="../index.html" class="volver">← Volver al menu</a>
        
        <h1>Actividad 1: Datos Personales</h1>
        <p>Introduce tus datos para calcular tu año de nacimiento y saber si eres mayor o menor de edad</p>
        
        <div class="formulario">
            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" placeholder="Introduce tu nombre">
            </div>
            
            <div class="campo">
                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" placeholder="Introduce tus apellidos">
            </div>
            
            <div class="campo">
                <label for="edad">Edad:</label>
                <input type="number" id="edad" placeholder="Introduce tu edad">
            </div>
            
            <button id="btnMostrar" class="btn-enviar">Mostrar Informacion</button>
        </div>
        
        <div id="resultado" class="resultado"></div>
    </div>

    <script src="actividad1.js"></script>
</body>
</html>
