<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombilla - Un solo boton</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <a href="../index.html" class="volver">← Volver al menu</a>
        
        <h1>Ejemplo Bombilla</h1>
        <p>Un solo boton: Encender / Apagar</p>
        
        <div class="bulb-container">
            <img id="bulbImage" class="bulb-img" src="https://www.w3schools.com/js/pic_bulboff.gif" alt="Bombilla apagada">
            
            <button id="toggleBulbBtn" class="btn-unico">Encender</button>
            
            <div class="status" id="statusText">
                Estado: Apagada
            </div>
        </div>
    </div>

    <script src="bombilla.js"></script>
</body>
</html>
